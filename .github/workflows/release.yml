name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            configure: cmake -B build -A x64
          - os: macos-latest
            name: macos
            configure: cmake -B build
          - os: ubuntu-latest
            name: linux
            configure: cmake -B build

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Install Windows packaging deps
        if: matrix.name == 'windows'
        run: choco install nsis -y

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: cmake --build build --config Release

      - name: Package Windows installer
        if: matrix.name == 'windows'
        run: cmake --build build --config Release --target windows_installer

      - name: Package macOS disk image
        if: matrix.name == 'macos'
        run: cpack -G DragNDrop --config build/CPackConfig.cmake

      - name: Package Linux archive
        if: matrix.name == 'linux'
        run: cpack -G TGZ --config build/CPackConfig.cmake

      - name: Upload artifact (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-windows-installer
          path: build/Vertex-*.exe

      - name: Upload portable app (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-windows-portable
          path: build/Release/Vertex.exe

      - name: Upload artifact (macOS)
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-macos-installer
          path: Vertex-*.dmg

      - name: Upload portable app (macOS)
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-macos-portable
          path: build/Vertex.app/Contents/MacOS/Vertex

      - name: Upload artifact (Linux)
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-linux-installer
          path: Vertex-*.tar.gz

      - name: Upload portable app (Linux)
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-linux-portable
          path: build/Vertex

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mv vertex-windows-installer/Vertex-*.exe Vertex-windows-installer.exe || true
          mv vertex-macos-installer/Vertex-*.dmg Vertex-macos-installer.dmg || true
          mv vertex-linux-installer/Vertex-*.tar.gz Vertex-linux-installer.tar.gz || true
          mv vertex-windows-portable/Vertex.exe Vertex-windows-portable.exe || true
          mv vertex-macos-portable/Vertex Vertex-macos-portable || true
          mv vertex-linux-portable/Vertex Vertex-linux-portable || true

          gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 && \
            gh release upload "$tag" Vertex-* --repo "$GITHUB_REPOSITORY" --clobber || \
            gh release create "$tag" Vertex-* --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
