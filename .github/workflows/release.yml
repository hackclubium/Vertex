name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_NET_RETRY: 10

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            configure: cmake -B build -A x64 -DVERTEX_BUILD_ARTI=ON
            exe: build/Release
            ext: .exe
          - os: macos-latest
            name: macos
            configure: cmake -B build -DVERTEX_BUILD_ARTI=ON
            exe: build
            ext: ""
          - os: ubuntu-latest
            name: linux
            configure: cmake -B build -DVERTEX_BUILD_ARTI=ON
            exe: build
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev pkg-config

      - name: Install Windows packaging deps
        if: matrix.name == 'windows'
        run: choco install nsis -y

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust crates
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: third_party/vertex_arti

      - name: Fetch Arti crates
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            cargo fetch --manifest-path third_party/vertex_arti/Cargo.toml && exit 0
            sleep $((i * 10))
          done
          cargo fetch --manifest-path third_party/vertex_arti/Cargo.toml

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: cmake --build build --config Release

      - name: Run html tests
        run: ${{ matrix.exe }}/vertex-tests${{ matrix.ext }} html

      - name: Run css tests
        run: ${{ matrix.exe }}/vertex-tests${{ matrix.ext }} css

      - name: Run layout tests
        run: ${{ matrix.exe }}/vertex-tests${{ matrix.ext }} layout

      - name: Run paint tests
        run: ${{ matrix.exe }}/vertex-tests${{ matrix.ext }} paint

      - name: Run js tests
        run: ${{ matrix.exe }}/vertex-tests${{ matrix.ext }} js

      - name: Run network tests
        run: ${{ matrix.exe }}/vertex-tests${{ matrix.ext }} network

      - name: Run codec tests
        run: ${{ matrix.exe }}/vertex-tests${{ matrix.ext }} codec

      - name: Run layout engine tests
        run: ${{ matrix.exe }}/vertex-layout-engine-tests${{ matrix.ext }}

      - name: Package Windows installer
        if: matrix.name == 'windows'
        run: cmake --build build --config Release --target windows_installer

      - name: Package macOS disk image
        if: matrix.name == 'macos'
        run: cpack -G DragNDrop --config build/CPackConfig.cmake

      - name: Package Linux archive
        if: matrix.name == 'linux'
        run: cpack -G TGZ --config build/CPackConfig.cmake

      - name: Upload artifact (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-windows-installer
          path: build/Vertex-*.exe

      - name: Upload portable app (Windows)
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-windows-portable
          path: |
            build/Release/Vertex.exe
            build/Release/vertex_arti.dll

      - name: Upload artifact (macOS)
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-macos-installer
          path: Vertex-*.dmg

      - name: Upload portable app (macOS)
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-macos-portable
          path: |
            build/Vertex.app/Contents/MacOS/Vertex
            build/Release/libvertex_arti.dylib
            build/libvertex_arti.dylib

      - name: Upload artifact (Linux)
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-linux-installer
          path: Vertex-*.tar.gz

      - name: Upload portable app (Linux)
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: vertex-linux-portable
          path: |
            build/Vertex
            build/libvertex_arti.so

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mv vertex-windows-installer/Vertex-*.exe Vertex-windows-installer.exe || true
          mv vertex-macos-installer/Vertex-*.dmg Vertex-macos-installer.dmg || true
          mv vertex-linux-installer/Vertex-*.tar.gz Vertex-linux-installer.tar.gz || true
          cp vertex-windows-portable/Vertex.exe Vertex-windows-portable.exe || true
          cp vertex-macos-portable/Vertex Vertex-macos-portable || true
          cp vertex-linux-portable/Vertex Vertex-linux-portable || true
          cp vertex-windows-portable/vertex_arti.dll Vertex-windows-vertex_arti.dll || true
          cp vertex-macos-portable/libvertex_arti.dylib Vertex-macos-libvertex_arti.dylib || true
          cp vertex-linux-portable/libvertex_arti.so Vertex-linux-libvertex_arti.so || true
          [ -d vertex-windows-portable ] && (cd vertex-windows-portable && zip -r ../Vertex-windows-portable.zip .) || true
          [ -d vertex-macos-portable ] && (cd vertex-macos-portable && zip -r ../Vertex-macos-portable.zip .) || true
          [ -d vertex-linux-portable ] && (cd vertex-linux-portable && tar -czf ../Vertex-linux-portable.tar.gz .) || true

          gh release view "$tag" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1 && \
            gh release upload "$tag" Vertex-* --repo "$GITHUB_REPOSITORY" --clobber || \
            gh release create "$tag" Vertex-* --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
