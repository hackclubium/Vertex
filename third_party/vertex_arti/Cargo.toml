[package]
name = "vertex_arti"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
arti-client = { version = "0.25", default-features = true }
tokio = { version = "1", features = ["rt-multi-thread", "net", "io-util", "time"] }
tokio-rustls = "0.26"
rustls = "0.23"
webpki-roots = "0.26"
url = "2"
